[build]
  base = "/"
  command = "pnpm install --frozen-lockfile && pnpm run build --filter=@finra-ui/storybook"
  publish = "apps/storybook/storybook-static"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

# Use pnpm for package management
[[plugins]]
  package = "@netlify/plugin-pnpm"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"